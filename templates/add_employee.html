<!DOCTYPE html>

<html>

<head>

    <title>
        Add Employee
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <div class="form-container">

        <div class="form-card">

            <h2>
                Add Employee
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label>
                        Employee Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label>
                        Department
                    </label>

                    <input
                        type="text"
                        name="department"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label>
                        Salary
                    </label>

                    <input
                        type="number"
                        name="salary"
                        class="form-control"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100"
                >
                    Add Employee
                </button>

            </form>

        </div>

    </div>

</body>

</html>
